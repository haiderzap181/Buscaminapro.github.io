<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monkey Banana | zhaider181</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <main class="game-container">
        <div class="logo-container">
            <img src="img/logo-monkey.png" alt="Logo" class="game-logo">
        </div>

        <header class="controls-panel">
            <div class="stats-bar">
                <div class="stat-item"><i class="fas fa-banana"></i> <span id="txt-bananas">Bananas:</span> <input type="number" id="input-minas" value="15" min="15" max="99"></div>
                <div class="stat-item"><i class="fas fa-stopwatch"></i> <span id="timer">0</span>s</div>
                <div class="stat-item"><i class="fas fa-trophy"></i> <span id="puntos">0</span></div>
                <div class="stat-item"><img src="img/btnconfi.png" id="btn-config" alt="Configuración" title="Configuración"></div>
            </div>
            
            <p class="info-rango-bananas">
                <span id="txt-tablero">Tablero:</span> 
                <select id="select-dificultad" class="input-dificultad">
                    <option value="8">Mono Aprendiz (8x8)</option>
                    <option value="10" selected>Gorila Plateado (10x10)</option>
                </select>
                | <span id="texto-limites">Límites: 15 a 99 bananas</span>
            </p>
            
            <button id="btn-reiniciar">REINICIAR PARTIDA</button>
        </header>

        <div id="tablero"></div>
        
        <section class="records-container">
            <button id="btn-toggle-records" class="gui-toggle-btn">
                <i class="fas fa-medal"></i> Mejores Récords <i class="fas fa-chevron-down icon-arrow"></i>
            </button>
            <div id="records-content" class="instrucciones-content">
                <table class="tabla-records">
                    <thead>
                        <tr>
                            <th id="th-puntos">Puntos</th>
                            <th id="th-tiempo">Tiempo</th>
                            <th id="th-bananas">Bananas</th>
                            <th id="th-rango">Rango</th>
                        </tr>
                    </thead>
                    <tbody id="lista-records"></tbody>
                </table>
                <div class="btn-borrar-container">
                    <button id="btn-borrar-records"><i class="fas fa-trash-alt"></i> Restablecer Récords</button>
                </div>
            </div>
        </section>

        <section class="records-container">
            <button id="btn-toggle-logros" class="gui-toggle-btn">
                <i class="fas fa-award"></i> Logros y Medallas <i class="fas fa-chevron-down icon-arrow"></i>
            </button>
            <div id="logros-content" class="instrucciones-content">
                </div>
        </section>
        
        <section id="instrucciones-juego">
            <button id="btn-toggle-gui" class="gui-toggle-btn">
                <i class="fas fa-book-open"></i> Guía del Explorador <i class="fas fa-chevron-down icon-arrow"></i>
            </button>
            <div id="instrucciones-content" class="instrucciones-content">
                </div>
        </section>

        <div id="modal-config" class="modal-oculto">
            <div class="modal-contenido" style="padding: 20px 15px;">
                <i class="fas fa-times" id="btn-cerrar-x" title="Cerrar"></i>
                
                <h2 id="titulo-opciones" style="color: var(--accent); margin-bottom: 15px;">Opciones</h2>
                
                <div class="config-scroll-area">
                    
                    <div class="config-section">
                        <h3 id="txt-idioma-btn" style="font-size: 1rem; color: var(--accent); margin-bottom: 5px;"><i class="fas fa-globe"></i> Idioma / Language</h3>
                        <p id="txt-desc-idioma" style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 10px;">Selecciona el idioma del juego.</p>
                        <div style="display: flex; gap: 10px; justify-content: center;">
                            <button id="btn-es" style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid var(--accent); background: var(--accent); color: var(--bg-main); font-weight: bold; cursor: pointer; font-family: 'Nunito', sans-serif;">Español</button>
                            <button id="btn-en" style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid var(--accent); background: transparent; color: white; font-weight: bold; cursor: pointer; font-family: 'Nunito', sans-serif;">English</button>
                        </div>
                    </div>

                    <div class="config-section">
                        <h3 id="txt-sonidos-btn" style="font-size: 1rem; color: var(--accent); margin-bottom: 5px;"><i class="fas fa-music"></i> Sonidos</h3>
                        <p id="txt-desc-sonidos" style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 10px;">Ajusta el volumen a tu gusto.</p>
                        <div class="slider-container" style="margin-top: 0;">
                            <label id="lbl-musica" for="slider-musica"><i class="fas fa-headphones"></i> Música General</label>
                            <input type="range" id="slider-musica" min="0" max="1" step="0.01" value="0.3">
                        </div>
                        <div class="slider-container" style="margin-bottom: 0;">
                            <label id="lbl-efectos" for="slider-efectos"><i class="fas fa-volume-up"></i> Efectos Especiales</label>
                            <input type="range" id="slider-efectos" min="0" max="1" step="0.01" value="1">
                        </div>
                    </div>

                    </div>

                <button id="btn-cerrar-config" style="margin-top: 10px;">GUARDAR Y CERRAR</button>
            </div>
        </div>

        <div id="modal-derrota" class="modal-oculto">
            <div class="modal-contenido">
                <img src="img/perdiste.png" alt="Mono Burlón" class="img-derrota">
                <p><span id="txt-puntuacion-derrota">Puntuación:</span> <span id="puntuacion-final">0</span></p>
                <button id="btn-reintentar-modal">VOLVER A INTENTAR</button>
            </div>
        </div>

        <div id="modal-victoria" class="modal-oculto" id-fondo="victoria">
            <div class="modal-contenido">
                <img src="img/ganaste.png" alt="Mono Furioso" class="img-derrota">
                <p><span id="txt-puntuacion-victoria">Puntuación:</span> <span id="puntuacion-final-victoria">0</span></p>
                <button id="btn-jugar-victoria">JUGAR DE NUEVO</button>
            </div>
        </div>

    </main>

    <audio id="sonido-explosion" src="audio/explosion.mp3"></audio>
    <audio id="sonido-revelar" src="audio/revelar.mp3"></audio>
    <audio id="sonido-victoria" src="audio/victoria.mp3"></audio>
    <audio id="sonido-ambiente" src="audio/track.mp3" loop></audio>
    <audio id="sonido-risa" src="audio/risa.mp3"></audio>

    <footer>Copyright &copy; 2026 - <span>zhaider181</span></footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="idiomas.js"></script>
    <script src="script.js"></script>
</body>
</html>
