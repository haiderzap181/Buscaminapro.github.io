<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buscaminas Pro | zhaider181</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">
    <header>
        <h1>Buscaminas Pro</h1>
        <div class="stats-panel">
            <div class="control-minas">
                <label for="input-minas">💣 Minas:</label>
                <input type="number" id="input-minas" value="15" min="15" max="99">
            </div>
            <div>⏱️ Tiempo: <span id="timer">0</span>s</div>
            <div>🏆 Puntos: <span id="puntos">0</span></div>
        </div>
        <button id="btn-reiniciar">REINICIAR PARTIDA</button>
    </header>

    <main>
        <div id="tablero" class="grid"></div>
        <div id="game-status" class="status-hidden"></div>
        
        <section id="instrucciones-juego">
            <h3>¿Qué significan los números?</h3>
            <p>Indican cuántas minas hay en las 8 casillas circundantes.</p>
            <p><span class="numero-1">1</span> | <span class="numero-2">2</span> | <span class="numero-3">3</span></p>
        </section>
    </main>

    <audio id="sonido-explosion" src="audio/explosion.mp3" preload="auto"></audio>
    <audio id="sonido-revelar" src="audio/revelar.mp3" preload="auto"></audio>
    <audio id="sonido-victoria" src="audio/victoria.mp3" preload="auto"></audio>

    <footer>
        <p>Copyright &copy; 2024 - <span>zhaider181</span> | Developer</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
