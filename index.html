<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscaminas Pro | zhaider181</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Buscaminas Pro</h1>
        <div class="stats-panel">
            <div class="control-minas">
                <label for="input-minas">💣 Minas (15-99):</label>
                <input type="number" id="input-minas" value="15" min="15" max="99">
            </div>
            <div>🏆 Puntos: <span id="puntos">0</span></div>
        </div>
        <button id="btn-reiniciar">Reiniciar Partida</button>
    </header>

    <main>
        <div id="tablero" class="grid"></div>
        <div id="game-status" class="status-hidden"></div>
        
        <section id="instrucciones-juego">
            <h3>Guía de Supervivencia</h3>
            <p>Los números indican minas cercanas. ¡Usa clic derecho (o mantén pulsado en móvil) para poner banderas!</p>
            <div class="guia-colores">
                <span class="numero-1">1: Seguro</span> | 
                <span class="numero-2">2: Alerta</span> | 
                <span class="numero-3">3: Peligro</span>
            </div>
        </section>
    </main>

    <audio id="sonido-explosion" src="audio/explosion.mp3" preload="auto"></audio>
    <audio id="sonido-revelar" src="audio/revelar.mp3" preload="auto"></audio>
    <audio id="sonido-victoria" src="audio/victoria.mp3" preload="auto"></audio>

    <footer>
        <p>Copyright &copy; 2024 - <span>zhaider181</span> | Developer</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
