<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscaminas Gamer Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>BUSCAMINA PRO</h1>
        <div class="stats-panel">
            <div class="control-minas">
                <label for="input-minas">💣 Minas (15-99):</label>
                <input type="number" id="input-minas" value="15" min="15" max="99">
            </div>
            <div>🏆 Puntaje: <span id="puntos">0</span></div>
        </div>
        <button id="btn-reiniciar">Reiniciar Partida</button>
    </header>

    <main>
        <div id="tablero" class="grid"></div>
        <div id="game-status" class="status-hidden"></div>
        
        <section id="instrucciones-juego">
            <h3>¿Qué significan los números?</h3>
            <div class="guia-numeros">
                <p>Indican cuántas minas hay en las 8 casillas circundantes.</p>
                <p><span class="numero-1">1</span>: Una mina cerca. | <span class="numero-2">2</span>: Dos minas. | <span class="numero-3">3</span>: Tres minas.</p>
            </div>
        </section>
    </main>
    <footer>
    <p>Copyright &copy; 2024 - <span>zhaider181</span> | Todos los derechos reservados</p>
</footer>
    <script src="script.js"></script>
</body>
</html>
